{% extends "base.html" %}

{% block content %}
<div class="container" style="margin-top:100px; margin-bottom:100px;">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h3 class="text-center mb-4">Login to StyleCart</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-dark btn-block">
                    Login
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
